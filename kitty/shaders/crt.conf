# version 330
uniform float time;

vec4 hook_main(vec4 old_pixel, vec2 pos, vec2 size) {
  // Radial distortion for CRT curve
  vec2 uv = pos / size * 2.0 - 1.0;
  float dist = dot(uv, uv);
  uv *= 1.0 + dist * 0.15;

  // Scanline effect
  float scan = sin(pos.y * 3.14159 * 1.5) * 0.04;

  return vec4(old_pixel.rgb - scan, old_pixel.a);
}

